<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Real-Time Drawing Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            z-index: 10;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .status.connected {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .status.disconnected {
            background: rgba(244, 67, 54, 0.2);
            border-color: rgba(244, 67, 54, 0.5);
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .canvas-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 15px;
            flex: 1;
            min-height: calc(100vh - 300px);
            max-height: calc(100vh - 200px);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-picker label {
            font-weight: bold;
            font-size: 14px;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 120px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-panel {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .info-panel h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }

        .info-item {
            font-size: 12px;
            margin-bottom: 8px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            font-weight: bold;
        }

        .info-value {
            color: #333;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: monospace;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .info-panel {
                flex: 1;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 Distributed Drawing Board</h1>
        <p>Real-Time Collaboration with Mini-RAFT Consensus</p>
    </div>

    <div class="status" id="status">
        <span id="statusText">Connecting...</span>
    </div>

    <div class="container">
        <div class="main">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>
            <div class="controls">
                <div class="color-picker">
                    <label for="colorPicker">Color:</label>
                    <input type="color" id="colorPicker" value="#000000">
                </div>
                <div class="color-picker">
                    <label for="brushSize">Size:</label>
                    <input type="range" id="brushSize" min="1" max="50" value="3">
                    <span id="sizeDisplay">3px</span>
                </div>
                <div class="button-group">
                    <button onclick="clearCanvas()">Clear Canvas</button>
                    <button onclick="undoStroke()">Undo</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="info-panel">
                <h3>📊 System Status</h3>
                <div class="info-item">
                    <span class="info-label">Gateway:</span>
                    <span class="info-value" id="gatewayStatus">Offline</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Strokes</div>
                        <div class="stat-value" id="strokeCount">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Log Size</div>
                        <div class="stat-value" id="logSize">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Latency</div>
                        <div class="stat-value" id="latency">0ms</div>
                    </div>
                </div>
            </div>

            <div class="info-panel">
                <h3>🔗 Cluster Info</h3>
                <div class="info-item">
                    <span class="info-label">Leader:</span>
                    <span class="info-value" id="leaderInfo">Unknown</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Term:</span>
                    <span class="info-value" id="termInfo">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Replicas:</span>
                    <span class="info-value" id="replicaCount">0/3</span>
                </div>
            </div>

            <div class="info-panel">
                <h3>📝 Connected Users</h3>
                <div id="userList" style="font-size: 12px;">
                    <div style="color: #999;">Waiting for connections...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
